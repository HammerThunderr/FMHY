name: Update FMHY data

on:
  schedule:
    - cron: "0 5 * * *"      # daily at 05:00 UTC
  workflow_dispatch:          # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      - scrape.py
      - .github/workflows/update.yml

permissions:
  contents: write             # allow the action to commit back

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clone FMHY wiki (source data)
        run: git clone --depth 1 https://github.com/fmhy/FMHY.wiki.git _wiki

      - name: Parse wiki -> JSON
        run: python scrape.py _wiki data

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf _wiki
          git add data
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update FMHY data ($(date -u +%Y-%m-%d))"
            git push
          fi
